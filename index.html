<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ADI Schedule Formatter</title>
<style>
  :root { --bg:#0f1720; --panel:#161f2b; --ink:#e6edf3; --mut:#8b9bb0;
          --accent:#4c9aff; --ok:#2ea043; --line:#26313f; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink);
         font:16px/1.5 -apple-system,Segoe UI,Roboto,sans-serif; }
  main { max-width:820px; margin:0 auto; padding:20px; }
  h1 { font-size:22px; font-weight:700; margin:0 0 10px; color:var(--ink); }
  h1.field { font-size:22px; margin:22px 0 8px; }

  /* Tier 1: the short, always-visible intro */
  .intro { margin:0 0 6px; }
  .intro-lead { font-size:15px; color:var(--ink); margin:0 0 12px; }
  .intro ul { margin:0; padding-left:20px; }
  .intro li { font-size:14px; color:var(--mut); margin:2px 0; }
  .intro li strong { color:var(--ink); font-weight:600; }
  code.inline { background:var(--panel); border:1px solid var(--line);
                border-radius:4px; padding:1px 5px;
                font:13px ui-monospace,Menlo,Consolas,monospace; color:var(--ink); }

  /* Tier 2: the collapsible full guide */
  details.guide { border:1px solid var(--line); border-radius:8px;
                  background:var(--panel); margin:0 0 18px; overflow:hidden; }
  details.guide > summary {
    cursor:pointer; padding:12px 16px; font-size:15px; font-weight:600;
    color:var(--ink); list-style:none; user-select:none;
    display:flex; align-items:center; gap:8px; }
  details.guide > summary::-webkit-details-marker { display:none; }
  details.guide > summary::before {
    content:"\25B8"; color:var(--accent); font-size:13px;
    transition:transform .15s ease; display:inline-block; }
  details.guide[open] > summary::before { transform:rotate(90deg); }
  details.guide > summary:hover { color:var(--accent); }

  textarea { width:100%; min-height:150px; resize:vertical; padding:12px;
             background:var(--panel); color:var(--ink); border:1px solid var(--line);
             border-radius:8px; font:15px/1.5 ui-monospace,Menlo,Consolas,monospace; }
  .row { display:flex; gap:10px; align-items:center; margin:12px 0; flex-wrap:wrap; }
  button { background:var(--accent); color:#fff; border:0; padding:10px 18px;
           border-radius:8px; font-size:15px; font-weight:600; cursor:pointer; }
  button.sec { background:transparent; border:1px solid var(--line); color:var(--ink); }
  button:disabled { opacity:.5; cursor:default; }
  pre { background:var(--panel); border:1px solid var(--line); border-radius:8px;
        padding:14px; overflow:auto; font:13px/1.45 ui-monospace,Menlo,Consolas,monospace; }
  /* Full guide: scrollable inside the open panel, capped so it never dominates. */
  #banner { max-height:50vh; white-space:pre; margin:0; border:0; border-radius:0;
            color:var(--mut); background:transparent; }
  #out { white-space:pre-wrap; word-break:break-word; min-height:150px; margin-top:6px; }
  .status { font-size:13px; color:var(--mut); }
  .status.ready { color:var(--ok); }
</style>
</head>
<body>
<main>
  <div class="intro" id="intro">
    <h1 id="intro-title">ADI Schedule Formatter</h1>
    <p class="intro-lead" id="intro-lead">Loading…</p>
    <ul id="intro-points"></ul>
  </div>

  <details class="guide" id="guide">
    <summary>Full guide &amp; examples</summary>
    <pre id="banner">Loading…</pre>
  </details>

  <h1 class="field">Your input (e.g. 3112 10-1130, 14* or  TD 0408)</h1>
  <textarea id="in" spellcheck="false"></textarea>
  <div class="row">
    <button id="run" disabled>Format</button>
    <button id="copy" class="sec">Copy output</button>
    <span id="status" class="status">Starting Python…</span>
  </div>
  <h1 class="field">Output</h1>
  <pre id="out"></pre>
</main>

<script src="https://cdn.jsdelivr.net/pyodide/v0.26.2/full/pyodide.js"></script>
<script>
const $ = id => document.getElementById(id);
let py = null;

function renderShort(text) {
  const lines = text.split("\n");
  const title = lines.shift() || "ADI Schedule Formatter";
  $("intro-title").textContent = title;

  const leadParts = [];
  const points = [];
  for (const line of lines) {
    const m = line.match(/^\s*-\s+(.*)$/);
    if (m) { points.push(m[1]); }
    else if (line.trim()) { leadParts.push(line.trim()); }
  }

  $("intro-lead").textContent = leadParts.join(" ");

  const ul = $("intro-points");
  ul.innerHTML = "";
  for (const p of points) {
    const li = document.createElement("li");
    const colon = p.indexOf(":");
    if (colon > -1 && colon < 40) {
      const strong = document.createElement("strong");
      strong.textContent = p.slice(0, colon + 1);
      li.appendChild(strong);
      li.appendChild(document.createTextNode(p.slice(colon + 1)));
    } else {
      li.textContent = p;
    }
    ul.appendChild(li);
  }
}

async function boot() {
  py = await loadPyodide();
  const src = await (await fetch("adi_schedule_formatter.py")).text();
  py.FS.writeFile("adi_schedule_formatter.py", src);
  py.runPython("import adi_schedule_formatter as adi");

  try { renderShort(py.runPython("adi.startup_banner_short()")); }
  catch (e) { $("intro-lead").textContent = "(intro unavailable)"; }

  try { $("banner").textContent = py.runPython("adi.startup_banner()"); }
  catch (e) { $("banner").textContent = "(guide unavailable)"; }

  $("run").disabled = false;
  $("status").textContent = "Ready";
  $("status").className = "status ready";
}

function format() {
  if (!py) return;
  py.globals.set("_t", $("in").value);
  let result;
  try { result = py.runPython("adi.process_input(_t)"); }
  catch (e) { result = "Error:\n" + (e.message || e); }
  $("out").textContent = result || "(no output)";
}

$("run").addEventListener("click", format);
$("in").addEventListener("keydown", e => {
  if ((e.metaKey || e.ctrlKey) && e.key === "Enter") { e.preventDefault(); format(); }
});
$("copy").addEventListener("click", async () => {
  await navigator.clipboard.writeText($("out").textContent);
  $("copy").textContent = "Copied!";
  setTimeout(() => $("copy").textContent = "Copy output", 1200);
});
boot();
</script>
</body>
</html>
